<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connected Safety & Gas Detection Landscape</title>
  <meta name="description" content="Interactive competitive landscape for connected safety and gas detection." />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body, #root {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #0a0f1a;
    }
    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    }
    button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const competitors = [
      {
        id: "blackline",
        name: "Blackline Safety",
        x: 22,
        y: 82,
        revenue: "$150.5M",
        hq: "Calgary, Canada",
        color: "#00D4AA",
        group: "Cloud-Native Disruptor",
        keyProduct: "G7/G8 Connected Wearable",
        arr: "$90.5M ARR",
        strengths: ["Only native cellular + satellite wearable", "128% net dollar retention", "310B+ data points", "True SaaS model"],
        weaknesses: ["Small scale vs. incumbents", "Limited fixed gas detection", "Not yet consistently profitable"],
        cloudScore: 95,
        scaleScore: 15,
        connectedScore: 98,
        analyticsScore: 90,
      },
      {
        id: "msa",
        name: "MSA Safety",
        x: 68,
        y: 58,
        revenue: "$1.9B",
        hq: "Cranberry Twp, PA",
        color: "#FF6B35",
        group: "Digital Transformer",
        keyProduct: "ALTAIR io 4 / MSA+ Platform",
        arr: "Building MSA+",
        strengths: ["$1.9B revenue, 48% gross margins", "25%+ share in fire service & head protection", "SAP integration for enterprise", "M&C TechGroup acquisition deepens detection"],
        weaknesses: ["Connected products still minority of revenue", "Hardware-centric organizational culture", "Platform maturity behind Blackline"],
        cloudScore: 55,
        scaleScore: 70,
        connectedScore: 60,
        analyticsScore: 50,
      },
      {
        id: "indsci",
        name: "Industrial Scientific",
        x: 48,
        y: 68,
        revenue: "Part of Fortive ($6.2B)",
        hq: "Pittsburgh, PA",
        color: "#7B68EE",
        group: "Digital Transformer",
        keyProduct: "Ventis Pro5 / iNet Platform",
        arr: "iNet Exchange SaaS",
        strengths: ["475K+ connected detectors", "iNet Exchange pioneered safety-as-a-service", "Fortive's SaaS transformation playbook", "Strong mid-market presence"],
        weaknesses: ["Revenue not separately disclosed", "Limited lone worker capabilities", "Parent company priorities may shift"],
        cloudScore: 72,
        scaleScore: 45,
        connectedScore: 75,
        analyticsScore: 70,
      },
      {
        id: "honeywell",
        name: "Honeywell",
        x: 88,
        y: 28,
        revenue: "$7.1B (SPS Segment)",
        hq: "Charlotte, NC",
        color: "#E63946",
        group: "Industrial Titan",
        keyProduct: "BW Series / Radius BZ1",
        arr: "Early stage",
        strengths: ["Massive scale and distribution (100+ countries)", "Building automation cross-sell", "H₂ leak detector (10yr no recalibration)", "$4B+ in recent strategic acquisitions"],
        weaknesses: ["Safety is small division in huge conglomerate", "Connected platform lags significantly", "PPE business declining", "Innovation cycles slower"],
        cloudScore: 25,
        scaleScore: 95,
        connectedScore: 30,
        analyticsScore: 25,
      },
      {
        id: "drager",
        name: "Dräger",
        x: 32,
        y: 32,
        revenue: "€1.47B (Safety Div.)",
        hq: "Lübeck, Germany",
        color: "#4ECDC4",
        group: "Industrial Titan",
        keyProduct: "X-am Series / Gas Detection Connect",
        arr: "Pay-per-use model",
        strengths: ["70+ years gas detection heritage", "190-country presence", "Deep sensor engineering (€333M R&D)", "Strong fixed gas detection portfolio"],
        weaknesses: ["Connected platform immature (Bluetooth-to-phone)", "Family-controlled, conservative culture", "Pay-per-hour cloud billing unusual", "Medical division splits strategic focus"],
        cloudScore: 30,
        scaleScore: 35,
        connectedScore: 35,
        analyticsScore: 30,
      },
    ];

    const marketGaps = [
      { name: "Unified Platform", x: 50, y: 90, description: "Single pane integrating personal + fixed + video + AI analytics" },
      { name: "SMB Connected Safety", x: 15, y: 55, description: "Affordable connected safety for small/mid construction & utilities" },
      { name: "Open Ecosystem", x: 55, y: 45, description: "Cross-vendor data interoperability and API standards" },
    ];

    const thStyle = {
      padding: "12px 12px",
      borderBottom: "2px solid rgba(255,255,255,0.08)",
      textAlign: "center",
      fontSize: 11,
      fontWeight: 700,
      color: "#8a9bb5",
      textTransform: "uppercase",
      letterSpacing: 1,
    };

    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `${r},${g},${b}`;
    }

    function CompetitiveLandscape() {
      const [selected, setSelected] = useState(null);
      const [showGaps, setShowGaps] = useState(false);
      const [hoveredGap, setHoveredGap] = useState(null);
      const [view, setView] = useState("map");
      const [animateIn, setAnimateIn] = useState(false);

      useEffect(() => {
        const timer = setTimeout(() => setAnimateIn(true), 100);
        return () => clearTimeout(timer);
      }, []);

      const comp = selected ? competitors.find((c) => c.id === selected) : null;

      return (
        <div
          style={{
            minHeight: "100vh",
            background: "linear-gradient(135deg, #0a0f1a 0%, #121c2e 50%, #0d1520 100%)",
            color: "#e8ecf1",
            fontFamily: "'Segoe UI', system-ui, -apple-system, sans-serif",
            overflow: "hidden",
          }}
        >
          <div
            style={{
              padding: "28px 32px 20px",
              borderBottom: "1px solid rgba(255,255,255,0.06)",
              background: "rgba(0,0,0,0.2)",
            }}
          >
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 16 }}>
              <div>
                <div style={{ fontSize: 11, letterSpacing: 3, textTransform: "uppercase", color: "#00D4AA", marginBottom: 6, fontWeight: 600 }}>
                  Competitive Landscape
                </div>
                <h1 style={{ fontSize: 26, fontWeight: 700, margin: 0, color: "#fff", lineHeight: 1.2 }}>
                  Connected Safety &amp; Gas Detection
                </h1>
                <p style={{ fontSize: 13, color: "#7a8ba5", marginTop: 6, maxWidth: 600 }}>
                  5 competitors mapped across cloud maturity and market scale — March 2026
                </p>
              </div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {["map", "radar", "matrix"].map((v) => (
                  <button
                    key={v}
                    onClick={() => setView(v)}
                    style={{
                      padding: "8px 16px",
                      borderRadius: 6,
                      border: "1px solid",
                      borderColor: view === v ? "#00D4AA" : "rgba(255,255,255,0.1)",
                      background: view === v ? "rgba(0,212,170,0.12)" : "rgba(255,255,255,0.03)",
                      color: view === v ? "#00D4AA" : "#7a8ba5",
                      fontSize: 12,
                      fontWeight: 600,
                      cursor: "pointer",
                      textTransform: "capitalize",
                      transition: "all 0.2s",
                    }}
                  >
                    {v === "map" ? "2×2 Map" : v === "radar" ? "Capabilities" : "Feature Matrix"}
                  </button>
                ))}
              </div>
            </div>
          </div>

          <div style={{ display: "flex", minHeight: "calc(100vh - 110px)" }}>
            <div style={{ flex: 1, padding: 24, position: "relative" }}>
              {view === "map" && (
                <div style={{ position: "relative", width: "100%", height: "100%", minHeight: 480 }}>
                  <div
                    style={{
                      position: "absolute",
                      bottom: 8,
                      left: "50%",
                      transform: "translateX(-50%)",
                      fontSize: 11,
                      color: "#4a5d78",
                      letterSpacing: 2,
                      textTransform: "uppercase",
                      fontWeight: 600,
                      whiteSpace: "nowrap",
                    }}
                  >
                    Market Scale &amp; Breadth →
                  </div>
                  <div
                    style={{
                      position: "absolute",
                      left: 8,
                      top: "50%",
                      transform: "rotate(-90deg) translateX(-50%)",
                      transformOrigin: "left center",
                      fontSize: 11,
                      color: "#4a5d78",
                      letterSpacing: 2,
                      textTransform: "uppercase",
                      fontWeight: 600,
                      whiteSpace: "nowrap",
                    }}
                  >
                    Cloud / Software Maturity →
                  </div>

                  <div
                    style={{
                      position: "absolute",
                      left: 40,
                      top: 10,
                      right: 20,
                      bottom: 36,
                      border: "1px solid rgba(255,255,255,0.06)",
                      borderRadius: 8,
                      overflow: "hidden",
                    }}
                  >
                    <div style={{ position: "absolute", left: "12%", top: "8%", fontSize: 10, color: "#2a3a52", fontWeight: 700, textTransform: "uppercase", letterSpacing: 1.5 }}>
                      Niche + Cloud-Native
                    </div>
                    <div style={{ position: "absolute", right: "8%", top: "8%", fontSize: 10, color: "#2a3a52", fontWeight: 700, textTransform: "uppercase", letterSpacing: 1.5, textAlign: "right" }}>
                      Scale + Cloud-Native
                    </div>
                    <div style={{ position: "absolute", left: "12%", bottom: "8%", fontSize: 10, color: "#2a3a52", fontWeight: 700, textTransform: "uppercase", letterSpacing: 1.5 }}>
                      Niche + Legacy
                    </div>
                    <div style={{ position: "absolute", right: "8%", bottom: "8%", fontSize: 10, color: "#2a3a52", fontWeight: 700, textTransform: "uppercase", letterSpacing: 1.5, textAlign: "right" }}>
                      Scale + Legacy
                    </div>

                    <div style={{ position: "absolute", left: "50%", top: 0, bottom: 0, width: 1, background: "rgba(255,255,255,0.04)" }} />
                    <div style={{ position: "absolute", top: "50%", left: 0, right: 0, height: 1, background: "rgba(255,255,255,0.04)" }} />

                    {showGaps &&
                      marketGaps.map((gap, i) => (
                        <div
                          key={i}
                          onMouseEnter={() => setHoveredGap(i)}
                          onMouseLeave={() => setHoveredGap(null)}
                          style={{
                            position: "absolute",
                            left: `${gap.x}%`,
                            top: `${100 - gap.y}%`,
                            transform: "translate(-50%, -50%)",
                            width: 56,
                            height: 56,
                            borderRadius: "50%",
                            border: "2px dashed rgba(255,215,0,0.4)",
                            background: "rgba(255,215,0,0.06)",
                            display: "flex",
                            alignItems: "center",
                            justifyContent: "center",
                            cursor: "pointer",
                            transition: "all 0.3s",
                            ...(hoveredGap === i ? { background: "rgba(255,215,0,0.15)", borderColor: "rgba(255,215,0,0.7)" } : {}),
                          }}
                        >
                          <span style={{ fontSize: 9, color: "#ffd700", textAlign: "center", fontWeight: 600, lineHeight: 1.2, padding: 4 }}>
                            {gap.name}
                          </span>
                          {hoveredGap === i && (
                            <div
                              style={{
                                position: "absolute",
                                top: "110%",
                                left: "50%",
                                transform: "translateX(-50%)",
                                background: "rgba(20,30,50,0.95)",
                                border: "1px solid rgba(255,215,0,0.3)",
                                borderRadius: 8,
                                padding: "10px 14px",
                                fontSize: 11,
                                color: "#ffd700",
                                width: 200,
                                textAlign: "center",
                                zIndex: 20,
                                lineHeight: 1.4,
                              }}
                            >
                              {gap.description}
                            </div>
                          )}
                        </div>
                      ))}

                    {competitors.map((c, i) => (
                      <div
                        key={c.id}
                        onClick={() => setSelected(c.id === selected ? null : c.id)}
                        style={{
                          position: "absolute",
                          left: `${c.x}%`,
                          top: `${100 - c.y}%`,
                          transform: `translate(-50%, -50%) scale(${animateIn ? 1 : 0})`,
                          transition: `all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) ${i * 0.1}s`,
                          cursor: "pointer",
                          zIndex: selected === c.id ? 10 : 5,
                        }}
                      >
                        <div
                          style={{
                            width: selected === c.id ? 72 : 52,
                            height: selected === c.id ? 72 : 52,
                            borderRadius: "50%",
                            background: `radial-gradient(circle, ${c.color}22 0%, transparent 70%)`,
                            border: `2px solid ${selected === c.id ? c.color : c.color + "66"}`,
                            display: "flex",
                            alignItems: "center",
                            justifyContent: "center",
                            transition: "all 0.3s",
                            boxShadow: selected === c.id ? `0 0 30px ${c.color}33` : "none",
                          }}
                        >
                          <div
                            style={{
                              width: selected === c.id ? 16 : 12,
                              height: selected === c.id ? 16 : 12,
                              borderRadius: "50%",
                              background: c.color,
                              transition: "all 0.3s",
                              boxShadow: `0 0 12px ${c.color}88`,
                            }}
                          />
                        </div>
                        <div
                          style={{
                            position: "absolute",
                            top: "105%",
                            left: "50%",
                            transform: "translateX(-50%)",
                            whiteSpace: "nowrap",
                            fontSize: 11,
                            fontWeight: 700,
                            color: selected === c.id ? c.color : "#8a9bb5",
                            transition: "color 0.3s",
                            textShadow: "0 1px 4px rgba(0,0,0,0.8)",
                          }}
                        >
                          {c.name}
                        </div>
                      </div>
                    ))}
                  </div>

                  <div style={{ position: "absolute", top: 16, right: 28 }}>
                    <button
                      onClick={() => setShowGaps(!showGaps)}
                      style={{
                        padding: "8px 14px",
                        borderRadius: 6,
                        border: showGaps ? "1px solid rgba(255,215,0,0.4)" : "1px solid rgba(255,255,255,0.1)",
                        background: showGaps ? "rgba(255,215,0,0.1)" : "rgba(255,255,255,0.03)",
                        color: showGaps ? "#ffd700" : "#7a8ba5",
                        fontSize: 11,
                        fontWeight: 600,
                        cursor: "pointer",
                        transition: "all 0.2s",
                      }}
                    >
                      {showGaps ? "◉" : "○"} Market Gaps
                    </button>
                  </div>
                </div>
              )}

              {view === "radar" && (
                <div style={{ display: "flex", flexWrap: "wrap", gap: 16, justifyContent: "center", padding: "20px 0" }}>
                  {competitors.map((c) => (
                    <div
                      key={c.id}
                      onClick={() => setSelected(c.id === selected ? null : c.id)}
                      style={{
                        background: selected === c.id ? `rgba(${hexToRgb(c.color)}, 0.08)` : "rgba(255,255,255,0.02)",
                        border: `1px solid ${selected === c.id ? c.color + "44" : "rgba(255,255,255,0.06)"}`,
                        borderRadius: 12,
                        padding: 20,
                        width: 180,
                        cursor: "pointer",
                        transition: "all 0.3s",
                      }}
                    >
                      <div style={{ fontSize: 13, fontWeight: 700, color: c.color, marginBottom: 16 }}>{c.name}</div>
                      {[
                        { label: "Cloud Platform", value: c.cloudScore },
                        { label: "Connected Devices", value: c.connectedScore },
                        { label: "Analytics / AI", value: c.analyticsScore },
                        { label: "Market Scale", value: c.scaleScore },
                      ].map((metric) => (
                        <div key={metric.label} style={{ marginBottom: 10 }}>
                          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                            <span style={{ fontSize: 10, color: "#6a7b95" }}>{metric.label}</span>
                            <span style={{ fontSize: 10, color: c.color, fontWeight: 700 }}>{metric.value}</span>
                          </div>
                          <div style={{ height: 4, background: "rgba(255,255,255,0.06)", borderRadius: 2, overflow: "hidden" }}>
                            <div
                              style={{
                                height: "100%",
                                width: `${metric.value}%`,
                                background: `linear-gradient(90deg, ${c.color}88, ${c.color})`,
                                borderRadius: 2,
                                transition: "width 0.8s ease-out",
                              }}
                            />
                          </div>
                        </div>
                      ))}
                    </div>
                  ))}
                </div>
              )}

              {view === "matrix" && (
                <div style={{ overflowX: "auto", padding: "10px 0" }}>
                  <table style={{ width: "100%", borderCollapse: "separate", borderSpacing: 0, fontSize: 12 }}>
                    <thead>
                      <tr>
                        <th style={{ ...thStyle, width: 140, textAlign: "left" }}>Capability</th>
                        {competitors.map((c) => (
                          <th key={c.id} style={{ ...thStyle, color: c.color, cursor: "pointer" }} onClick={() => setSelected(c.id === selected ? null : c.id)}>
                            {c.name}
                          </th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {[
                        ["Revenue", "$150.5M", "$1.9B", "Fortive subsidiary", "$7.1B SPS", "€1.47B Safety"],
                        ["Cloud Platform", "★★★★★", "★★★☆☆", "★★★★☆", "★★☆☆☆", "★★☆☆☆"],
                        ["Personal Gas Detection", "★★★★☆", "★★★★★", "★★★★★", "★★★★☆", "★★★★★"],
                        ["Lone Worker", "★★★★★", "★★☆☆☆", "★★☆☆☆", "★☆☆☆☆", "★★☆☆☆"],
                        ["Cellular Built-in", "✅ LTE", "⚠️ Phone bridge", "✅ LTE-M/5G", "⚠️ BT/WiFi", "⚠️ BT to phone"],
                        ["Satellite Backup", "✅", "—", "—", "—", "—"],
                        ["Fixed Gas Detection", "⚠️ Area only", "✅ Full", "✅ Full", "✅ Deep", "✅ Deep"],
                        ["SaaS / ARR", "✅ Core model", "⚠️ Building", "✅ iNet Exchange", "⚠️ Early", "⚠️ Pay-per-hour"],
                        ["Fire Service / SCBA", "—", "✅ Leader", "—", "✅ Strong", "✅ Strong"],
                        ["Data Analytics", "★★★★★", "★★★☆☆", "★★★★☆", "★★☆☆☆", "★★☆☆☆"],
                        ["Countries", "75+", "40+ offices", "Global", "100+", "190+"]
                      ].map((row, i) => (
                        <tr key={i}>
                          {row.map((cell, j) => (
                            <td
                              key={j}
                              style={{
                                padding: "10px 12px",
                                borderBottom: "1px solid rgba(255,255,255,0.04)",
                                color: j === 0 ? "#8a9bb5" : "#c8d3e0",
                                fontWeight: j === 0 ? 600 : 400,
                                textAlign: j === 0 ? "left" : "center",
                                fontSize: 11,
                                background: i % 2 === 0 ? "rgba(255,255,255,0.01)" : "transparent",
                              }}
                            >
                              {cell}
                            </td>
                          ))}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>

            <div
              style={{
                width: comp ? 320 : 0,
                overflow: "hidden",
                transition: "width 0.4s cubic-bezier(0.4, 0, 0.2, 1)",
                borderLeft: comp ? "1px solid rgba(255,255,255,0.06)" : "none",
                background: "rgba(0,0,0,0.2)",
                flexShrink: 0,
              }}
            >
              {comp && (
                <div style={{ padding: 24, width: 320, boxSizing: "border-box" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
                    <div style={{ fontSize: 18, fontWeight: 800, color: comp.color, lineHeight: 1.2 }}>
                      {comp.name}
                    </div>
                    <button
                      onClick={() => setSelected(null)}
                      style={{
                        background: "none",
                        border: "1px solid rgba(255,255,255,0.1)",
                        color: "#6a7b95",
                        width: 28,
                        height: 28,
                        borderRadius: 6,
                        cursor: "pointer",
                        fontSize: 14,
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "center",
                      }}
                    >
                      ×
                    </button>
                  </div>

                  <div style={{ fontSize: 10, letterSpacing: 2, textTransform: "uppercase", color: "#4a5d78", fontWeight: 600, marginBottom: 6 }}>
                    {comp.group}
                  </div>

                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 20 }}>
                    {[
                      { label: "Revenue", value: comp.revenue },
                      { label: "ARR", value: comp.arr },
                      { label: "HQ", value: comp.hq },
                      { label: "Key Product", value: comp.keyProduct },
                    ].map((item) => (
                      <div key={item.label} style={{ background: "rgba(255,255,255,0.03)", borderRadius: 8, padding: "10px 12px" }}>
                        <div style={{ fontSize: 9, color: "#4a5d78", textTransform: "uppercase", letterSpacing: 1, marginBottom: 4 }}>{item.label}</div>
                        <div style={{ fontSize: 12, color: "#c8d3e0", fontWeight: 600, lineHeight: 1.3 }}>{item.value}</div>
                      </div>
                    ))}
                  </div>

                  <div style={{ marginBottom: 16 }}>
                    <div style={{ fontSize: 10, letterSpacing: 2, textTransform: "uppercase", color: comp.color, fontWeight: 700, marginBottom: 10 }}>
                      Strengths
                    </div>
                    {comp.strengths.map((s, i) => (
                      <div key={i} style={{ fontSize: 11, color: "#a0b0c5", marginBottom: 6, paddingLeft: 12, position: "relative", lineHeight: 1.4 }}>
                        <span style={{ position: "absolute", left: 0, color: comp.color }}>+</span>
                        {s}
                      </div>
                    ))}
                  </div>

                  <div>
                    <div style={{ fontSize: 10, letterSpacing: 2, textTransform: "uppercase", color: "#E63946", fontWeight: 700, marginBottom: 10 }}>
                      Vulnerabilities
                    </div>
                    {comp.weaknesses.map((w, i) => (
                      <div key={i} style={{ fontSize: 11, color: "#a0b0c5", marginBottom: 6, paddingLeft: 12, position: "relative", lineHeight: 1.4 }}>
                        <span style={{ position: "absolute", left: 0, color: "#E63946" }}>–</span>
                        {w}
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<CompetitiveLandscape />);
  </script>
</body>
</html>
