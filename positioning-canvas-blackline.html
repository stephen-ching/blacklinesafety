<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Positioning: Blackline Safety</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

    :root {
      --bg1: #0c0f1a;
      --bg2: #151929;
      --bg3: #1a1f35;
      --text: #ffffff;
      --muted: #94a3b8;
      --muted2: #64748b;
      --violet: #8B5CF6;
      --violet-soft: #c4b5fd;
      --glass: rgba(15, 20, 40, 0.6);
      --glass-border: rgba(148, 163, 184, 0.08);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(160deg, var(--bg1) 0%, var(--bg2) 40%, var(--bg3) 100%);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    @media (min-width: 640px) {
      .page {
        padding: 28px 32px 48px;
      }
    }

    .eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.18em;
      color: var(--violet-soft);
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 34px;
      line-height: 1.15;
      margin: 0;
    }

    .subtle {
      font-size: 12px;
      color: var(--muted2);
      margin-top: 8px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 16px 0 10px;
      scrollbar-width: thin;
    }

    .tab {
      white-space: nowrap;
      border-radius: 10px;
      border: 1px solid var(--glass-border);
      background: transparent;
      color: rgba(148, 163, 184, 0.7);
      padding: 10px 14px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.18s ease;
    }

    .tab:hover {
      color: rgba(226, 232, 240, 0.95);
      border-color: rgba(148, 163, 184, 0.22);
    }

    .tab.active {
      background: rgba(139, 92, 246, 0.12);
      border-color: rgba(139, 92, 246, 0.35);
      color: var(--violet-soft);
    }

    .glass {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 18px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.18);
    }

    .glass:hover {
      border-color: rgba(148, 163, 184, 0.15);
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    .canvas-stack {
      display: grid;
      gap: 6px;
    }

    .canvas-card {
      padding: 16px;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease;
      border-left-width: 3px;
      border-left-style: solid;
    }

    .canvas-card:hover {
      transform: translateY(-1px);
    }

    .row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .row-left {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      min-width: 0;
    }

    .icon {
      font-size: 20px;
      line-height: 1;
      margin-top: 1px;
      flex-shrink: 0;
    }

    .label {
      font-size: 15px;
      font-weight: 700;
      color: white;
      margin-bottom: 4px;
    }

    .question {
      font-size: 12px;
      color: var(--muted2);
      line-height: 1.45;
    }

    .count-pill {
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
      border: 1px solid transparent;
    }

    .expandable {
      margin-top: 16px;
      display: none;
      gap: 12px;
      flex-direction: column;
    }

    .canvas-card.expanded .expandable {
      display: flex;
    }

    .item-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .item-index {
      width: 22px;
      height: 22px;
      border-radius: 7px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .item-title {
      font-size: 13px;
      font-weight: 600;
      color: #e2e8f0;
      line-height: 1.45;
    }

    .item-detail {
      font-size: 12px;
      color: var(--muted2);
      line-height: 1.5;
      margin-top: 4px;
    }

    .flow-arrow {
      display: flex;
      justify-content: center;
      margin: 2px 0;
    }

    .flow-arrow svg {
      width: 20px;
      height: 20px;
    }

    .callout {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(139, 92, 246, 0.06);
      border: 1px solid rgba(139, 92, 246, 0.15);
    }

    .callout-title {
      font-size: 12px;
      font-weight: 700;
      color: #a78bfa;
      margin-bottom: 6px;
    }

    .callout p {
      margin: 0;
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.65;
    }

    .statement-highlight {
      padding: 24px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(139,92,246,0.08), rgba(59,130,246,0.08));
      border: 1px solid rgba(139,92,246,0.2);
    }

    .statement-block {
      margin-bottom: 18px;
    }

    .statement-block:last-child {
      margin-bottom: 0;
    }

    .statement-key {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .statement-copy {
      margin-top: 6px;
      line-height: 1.65;
    }

    .statement-copy.playfair {
      font-family: 'Playfair Display', serif;
    }

    .statement-copy.big {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.2;
      color: white;
    }

    .statement-copy.normal {
      font-size: 15px;
      color: #cbd5e1;
    }

    .statement-copy.emphasis {
      color: white;
      font-weight: 600;
    }

    .section-card {
      padding: 20px;
      margin-top: 16px;
    }

    .mono-title {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .mini-list {
      display: grid;
      gap: 14px;
    }

    .mini-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .badge {
      font-size: 12px;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 8px;
      border: 1px solid transparent;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .mini-item-title {
      font-size: 13px;
      font-weight: 600;
      color: white;
      line-height: 1.45;
    }

    .mini-item-text {
      font-size: 12px;
      color: var(--muted2);
      line-height: 1.55;
      margin-top: 4px;
    }

    .caption {
      font-size: 12px;
      color: var(--muted2);
      margin-bottom: 10px;
    }

    .tagline-card {
      padding: 20px;
      margin-bottom: 14px;
      position: relative;
    }

    .tagline-card.recommended {
      box-shadow: 0 0 0 1px rgba(139,92,246,0.3), 0 10px 28px rgba(0,0,0,0.18);
    }

    .recommended-note {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: #a78bfa;
      margin-bottom: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .tagline-type {
      font-size: 12px;
      color: var(--muted2);
      margin-bottom: 8px;
    }

    .tagline-text {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      line-height: 1.2;
      font-weight: 700;
      margin: 0;
    }

    .tagline-rationale {
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.6;
      margin-top: 12px;
    }

    .pitch-card {
      padding: 20px;
      margin-top: 8px;
      border-top: 2px solid rgba(59,130,246,0.3);
    }

    .pitch-copy p {
      margin: 0 0 14px;
      font-size: 14px;
      color: #cbd5e1;
      line-height: 1.7;
    }

    .pitch-copy p:last-child {
      margin-bottom: 0;
    }

    .persona-card {
      padding: 20px;
      margin-bottom: 12px;
    }

    .persona-head {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 14px;
    }

    .persona-emoji {
      font-size: 22px;
      line-height: 1;
    }

    .persona-role {
      font-size: 15px;
      font-weight: 700;
      color: white;
    }

    .persona-focus {
      font-size: 12px;
      color: var(--muted2);
      margin-top: 3px;
    }

    .persona-message {
      border-radius: 12px;
      padding: 14px;
      background: rgba(139,92,246,0.06);
      border: 1px solid rgba(139,92,246,0.12);
      margin-bottom: 10px;
    }

    .persona-message-title {
      font-size: 12px;
      color: #c4b5fd;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .persona-message p {
      margin: 0;
      font-size: 14px;
      color: #e2e8f0;
      line-height: 1.65;
    }

    .proof {
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.55;
    }

    .proof strong {
      color: #cbd5e1;
    }

    .validate-card {
      padding: 20px;
      margin-bottom: 16px;
    }

    .usage-grid {
      display: grid;
      gap: 10px;
    }

    .usage-row {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 12px;
      font-size: 12px;
      align-items: start;
    }

    .usage-context {
      color: var(--muted2);
    }

    .usage-use {
      color: #cbd5e1;
      line-height: 1.5;
    }

    @media (max-width: 640px) {
      h1 { font-size: 28px; }
      .statement-copy.big { font-size: 23px; }
      .tagline-text { font-size: 23px; }
      .usage-row { grid-template-columns: 1fr; gap: 4px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="eyebrow">APRIL DUNFORD'S OBVIOUSLY AWESOME</div>
    <h1>Positioning: Blackline Safety</h1>
    <div class="subtle">Strategic clarity &amp; internal alignment — March 2026</div>

    <div class="tabs" id="tabs"></div>
    <div id="content"></div>
  </div>

  <script>
    const data = {"canvasElements": [{"id": "alternatives", "label": "Competitive Alternatives", "question": "What would customers do if Blackline didn't exist?", "color": "#EF4444", "icon": "⬡", "items": [{"title": "MSA Safety ALTAIR + separate lone worker + separate radio", "detail": "Three vendors, three devices, no unified data"}, {"title": "Industrial Scientific Ventis Pro5 + iNet Exchange", "detail": "Strong subscription model but no connectivity or communication"}, {"title": "Honeywell BW/RAE portables + manual check-ins", "detail": "Trusted hardware, but paper-based worker tracking"}, {"title": "Status quo: standalone detectors + nothing", "detail": "No connectivity, no lone worker protection, hope for the best"}]}, {"id": "attributes", "label": "Unique Attributes", "question": "What does Blackline have that alternatives lack?", "color": "#3B82F6", "icon": "◆", "items": [{"title": "Cloud-native platform (Blackline Live)", "detail": "Built for IoT from day one — not bolted onto legacy hardware"}, {"title": "Gas + lone worker + comms in one device", "detail": "G8 replaces three separate devices with one wearable"}, {"title": "Cellular + satellite connectivity", "detail": "True anywhere-connectivity vs. limited wireless options"}, {"title": "OTA software updates (G8 architecture)", "detail": "Device improves continuously without physical replacement"}, {"title": "323B+ data points powering analytics", "detail": "Growing data moat enables predictive safety insights"}]}, {"id": "value", "label": "Value for Customer", "question": "Why do those attributes matter?", "color": "#10B981", "icon": "✦", "items": [{"title": "Real-time visibility into entire workforce", "detail": "Know every worker's status, location, and gas exposure — live"}, {"title": "Faster emergency response", "detail": "Integrated location + gas + comms = seconds vs. minutes"}, {"title": "Device consolidation = lower TCO", "detail": "One device, one vendor, predictable SaaS cost structure"}, {"title": "Continuous compliance without manual processes", "detail": "Audit-ready data streams automatically — no paper trails"}, {"title": "Predictive safety insights from aggregated data", "detail": "Patterns across 323B+ data points reveal risks before incidents"}]}, {"id": "customers", "label": "Best-Fit Customers", "question": "Who cares most about this value?", "color": "#F59E0B", "icon": "◎", "items": [{"title": "Mid-to-large industrial companies", "detail": "3,000+ customers across 75 countries, 12+ industries"}, {"title": "Distributed/remote/lone workers in hazardous environments", "detail": "Oil & gas, mining, utilities, chemicals, construction"}, {"title": "Frustrated with multi-vendor device sprawl", "detail": "Managing 3+ safety device types per worker is a pain point"}, {"title": "Already investing in connected worksite initiatives", "detail": "Digital transformation mandate extends to safety operations"}]}, {"id": "category", "label": "Market Category", "question": "What frame helps customers understand quickly?", "color": "#8B5CF6", "icon": "⬢", "items": [{"title": "Connected Worker Safety Platform", "detail": "Category creation — Blackline defines and owns this space"}, {"title": "NOT 'gas detection'", "detail": "Fighting MSA ($1.9B), Honeywell (22% share) on their turf"}, {"title": "NOT 'lone worker protection'", "detail": "Too narrow — undersells the platform value"}, {"title": "Signals convergence + connectivity + continuous value", "detail": "Platform > instrument; connected > standalone; software > hardware"}]}], "taglines": [{"type": "Benefit-Led", "text": "Every worker visible. Every hazard known. Every second counts.", "rationale": "Focuses on real-time situational awareness — the core outcome."}, {"type": "Category-Led", "text": "The connected worker safety platform.", "rationale": "Plants the category flag. Simple, declarative, ownable. Recommended for internal alignment.", "recommended": true}, {"type": "Differentiator-Led", "text": "One device. One platform. Every worker home safe.", "rationale": "Emphasizes convergence + emotional mission. Strong for campaigns."}], "personas": [{"role": "EHS Director", "emoji": "📋", "focus": "Budget, regulation, compliance", "message": "Replace three disconnected systems with one platform — real-time compliance data, audit-ready reporting, no manual processes.", "proof": "128% net dollar retention, 323B+ data points"}, {"role": "Safety Manager", "emoji": "🔧", "focus": "Daily operations, incident response", "message": "Know where every worker is, what gas they're exposed to, and talk to them — all from one screen.", "proof": "G8 integrates detection + location + voice. 8M+ emergency responses."}, {"role": "Operations VP", "emoji": "📊", "focus": "Productivity, cost, workforce", "message": "Connected safety is an operational advantage. One device, one platform, one vendor. Lower TCO, fewer incidents.", "proof": "HeSaaS model = predictable costs. Single device replaces three."}, {"role": "CFO / Procurement", "emoji": "💰", "focus": "Cost justification, vendor risk", "message": "Shift from unpredictable capex to predictable SaaS. 36 quarters of growth, 3,000+ customers — proven platform.", "proof": "$150.5M FY2025 revenue. First full year positive EBITDA."}], "assumptions": [{"text": "'Connected worker safety platform' resonates with buyers", "risk": "Medium", "action": "Test with 10 best-fit customers"}, {"text": "'One device replaces three' is a primary purchase driver", "risk": "High", "action": "Win/loss interview analysis"}, {"text": "Cloud-native vs. bolt-on distinction matters to non-technical buyers", "risk": "Medium", "action": "Competitive deal analysis"}, {"text": "TCO advantage is real and quantifiable", "risk": "High", "action": "Build customer-facing TCO calculator"}, {"text": "128% NDR is driven by platform value, not price increases", "risk": "Low", "action": "Decompose NDR composition"}]};

    const sections = [
      { id: "canvas", label: "Positioning Canvas" },
      { id: "statement", label: "Positioning Statement" },
      { id: "taglines", label: "Taglines & Pitch" },
      { id: "personas", label: "Persona Messaging" },
      { id: "validate", label: "Validate" }
    ];

    let activeSection = "canvas";
    let expandedElement = null;

    const tabsEl = document.getElementById("tabs");
    const contentEl = document.getElementById("content");

    function hexToRgba(hex, alpha) {
      const clean = hex.replace("#", "");
      const value = clean.length === 3
        ? clean.split("").map(ch => ch + ch).join("")
        : clean;
      const int = parseInt(value, 16);
      const r = (int >> 16) & 255;
      const g = (int >> 8) & 255;
      const b = int & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderTabs() {
      tabsEl.innerHTML = sections.map(section => `
        <button class="tab ${activeSection === section.id ? 'active' : ''}" data-id="${section.id}">
          ${escapeHtml(section.label)}
        </button>
      `).join("");

      tabsEl.querySelectorAll(".tab").forEach(button => {
        button.addEventListener("click", () => {
          activeSection = button.dataset.id;
          render();
        });
      });
    }

    function renderFlowArrow(color) {
      return `
        <div class="flow-arrow">
          <svg viewBox="0 0 20 20" aria-hidden="true">
            <path d="M10 4 L10 14 M6 10 L10 14 L14 10"
                  stroke="${color}"
                  stroke-width="1.5"
                  fill="none"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  opacity="0.4"></path>
          </svg>
        </div>
      `;
    }

    function renderCanvasSection() {
      const cards = data.canvasElements.map((el, idx) => {
        const expanded = expandedElement === el.id;
        return `
          <div>
            <div class="glass canvas-card ${expanded ? 'expanded' : ''}"
                 data-expand-id="${escapeHtml(el.id)}"
                 style="border-left-color: ${el.color};">
              <div class="row">
                <div class="row-left">
                  <div class="icon">${escapeHtml(el.icon)}</div>
                  <div>
                    <div class="label">${escapeHtml(el.label)}</div>
                    <div class="question">${escapeHtml(el.question)}</div>
                  </div>
                </div>
                <div class="count-pill"
                     style="background:${hexToRgba(el.color, 0.08)}; color:${el.color}; border-color:${hexToRgba(el.color, 0.2)};">
                  ${el.items.length}
                </div>
              </div>
              <div class="expandable">
                ${el.items.map((item, i) => `
                  <div class="item-row">
                    <div class="item-index"
                         style="background:${hexToRgba(el.color, 0.10)}; color:${el.color};">
                      ${i + 1}
                    </div>
                    <div>
                      <div class="item-title">${escapeHtml(item.title)}</div>
                      <div class="item-detail">${escapeHtml(item.detail)}</div>
                    </div>
                  </div>
                `).join("")}
              </div>
            </div>
            ${idx < data.canvasElements.length - 1 ? renderFlowArrow(data.canvasElements[idx + 1].color) : ""}
          </div>
        `;
      }).join("");

      return `
        <div class="section active" id="section-canvas">
          <div class="canvas-stack">${cards}</div>
          <div class="callout">
            <div class="callout-title">💡 Why this flow matters</div>
            <p>
              April Dunford's key insight: start with competitive alternatives, not features.
              Each step builds on the previous one — alternatives reveal what's unique, uniqueness
              maps to value, value identifies best-fit customers, and customers determine the right
              category frame.
            </p>
          </div>
        </div>
      `;
    }

    function renderStatementSection() {
      const categoryOptions = [
        {
          name: "Existing: 'Gas Detection'",
          verdict: "Reject",
          color: "#EF4444",
          reason: "Fighting MSA ($1.9B) and Honeywell (22% share) on their turf. Undersells platform value."
        },
        {
          name: "Subcategory: 'Connected Gas Detection'",
          verdict: "Close",
          color: "#F59E0B",
          reason: "Better, but still anchors in gas detection. Misses lone worker and comms convergence."
        },
        {
          name: "New Category: 'Connected Worker Safety Platform'",
          verdict: "Recommended ✓",
          color: "#10B981",
          reason: "'Connected' = cloud-native IoT. 'Worker' = person-centered. 'Platform' = convergence + ongoing value."
        }
      ];

      return `
        <div class="section active" id="section-statement">
          <div class="statement-highlight">
            <div class="statement-block">
              <div class="statement-key" style="color:#F59E0B;">FOR</div>
              <div class="statement-copy playfair normal" style="color:white;">
                EHS leaders and safety operations teams at industrial companies with distributed workforces in hazardous environments
              </div>
            </div>
            <div class="statement-block">
              <div class="statement-key" style="color:#F59E0B;">WHO</div>
              <div class="statement-copy normal">
                are struggling to maintain real-time visibility into worker safety across multiple disconnected devices, manual processes, and siloed data,
              </div>
            </div>
            <div class="statement-block">
              <div class="statement-key" style="color:#8B5CF6;">BLACKLINE SAFETY IS A</div>
              <div class="statement-copy playfair big">Connected Worker Safety Platform</div>
            </div>
            <div class="statement-block">
              <div class="statement-key" style="color:#10B981;">THAT</div>
              <div class="statement-copy normal">
                gives you live situational awareness of every worker's safety status — gas exposure, location, lone worker check-ins, and two-way communication — in a single cloud-connected ecosystem.
              </div>
            </div>
            <div class="statement-block">
              <div class="statement-key" style="color:#EF4444;">UNLIKE</div>
              <div class="statement-copy normal">
                legacy gas detectors from MSA, Honeywell, and Industrial Scientific that were designed as standalone instruments and have connectivity bolted on after the fact,
              </div>
            </div>
            <div class="statement-block">
              <div class="statement-key" style="color:#3B82F6;">WE</div>
              <div class="statement-copy normal emphasis">
                built from the ground up as a cloud-native platform where every data point streams in real time, every device improves through software updates, and every worker is connected to the people who can help them.
              </div>
            </div>
          </div>

          <div class="glass section-card">
            <div class="mono-title" style="color:#a78bfa;">Category Strategy</div>
            <div class="mini-list">
              ${categoryOptions.map(opt => `
                <div class="mini-item">
                  <div class="badge"
                       style="background:${hexToRgba(opt.color, 0.08)}; color:${opt.color}; border-color:${hexToRgba(opt.color, 0.2)};">
                    ${escapeHtml(opt.verdict)}
                  </div>
                  <div>
                    <div class="mini-item-title">${escapeHtml(opt.name)}</div>
                    <div class="mini-item-text">${escapeHtml(opt.reason)}</div>
                  </div>
                </div>
              `).join("")}
            </div>
          </div>
        </div>
      `;
    }

    function renderTaglinesSection() {
      return `
        <div class="section active" id="section-taglines">
          <div class="caption">Three tagline strategies — each serves a different purpose</div>
          ${data.taglines.map(t => `
            <div class="glass tagline-card ${t.recommended ? 'recommended' : ''}">
              ${t.recommended ? `<div class="recommended-note">★ Recommended for internal alignment</div>` : ""}
              <div class="tagline-type">${escapeHtml(t.type)}</div>
              <p class="tagline-text">"${escapeHtml(t.text)}"</p>
              <div class="tagline-rationale">${escapeHtml(t.rationale)}</div>
            </div>
          `).join("")}

          <div class="glass pitch-card">
            <div class="mono-title" style="color:#60a5fa;">30-Second Elevator Pitch</div>
            <div class="pitch-copy">
              <p><span style="color:#fb7185;font-weight:600;">The problem:</span> Industrial companies protect workers with gas detectors, lone worker devices, and radios — three separate systems that don't talk to each other. When something goes wrong, safety teams are blind.</p>
              <p><span style="color:#60a5fa;font-weight:600;">The solution:</span> Blackline Safety replaces all three with one connected platform. Our G8 wearable detects gas, tracks workers, and enables real-time communication — all streaming to the cloud so you know every worker's status, everywhere, right now.</p>
              <p><span style="color:#34d399;font-weight:600;">The proof:</span> Three thousand companies in 75 countries trust us, with $90 million in recurring revenue and 36 consecutive quarters of growth.</p>
            </div>
          </div>
        </div>
      `;
    }

    function renderPersonasSection() {
      return `
        <div class="section active" id="section-personas">
          <div class="caption">Same positioning, different emphasis per audience</div>
          ${data.personas.map(p => `
            <div class="glass persona-card">
              <div class="persona-head">
                <div class="persona-emoji">${escapeHtml(p.emoji)}</div>
                <div>
                  <div class="persona-role">${escapeHtml(p.role)}</div>
                  <div class="persona-focus">Cares about: ${escapeHtml(p.focus)}</div>
                </div>
              </div>
              <div class="persona-message">
                <div class="persona-message-title">Lead message</div>
                <p>"${escapeHtml(p.message)}"</p>
              </div>
              <div class="proof">✓ <strong>Proof:</strong> ${escapeHtml(p.proof)}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function riskStyles(risk) {
      if (risk === "High") {
        return {
          bg: "rgba(239,68,68,0.12)",
          color: "#f87171",
          border: "rgba(239,68,68,0.25)"
        };
      }
      if (risk === "Medium") {
        return {
          bg: "rgba(245,158,11,0.12)",
          color: "#fbbf24",
          border: "rgba(245,158,11,0.25)"
        };
      }
      return {
        bg: "rgba(16,185,129,0.12)",
        color: "#34d399",
        border: "rgba(16,185,129,0.25)"
      };
    }

    function renderValidateSection() {
      const usageRows = [
        { context: "Internal strategy sessions", use: "Full Positioning Statement + Category Strategy" },
        { context: "Homepage headline", use: "Tagline: 'The connected worker safety platform'" },
        { context: "Sales deck intro", use: "30-second Elevator Pitch" },
        { context: "Competitive deals", use: "Competitive Frame from battlecard" },
        { context: "Investor / earnings call", use: "Positioning Statement + ARR proof points" },
        { context: "G8 launch messaging", use: "Differentiator tagline + platform narrative" },
        { context: "Recruiting", use: "Elevator Pitch + mission framing" }
      ];

      return `
        <div class="section active" id="section-validate">
          <div class="glass validate-card">
            <div class="mono-title" style="color:#fbbf24;">Assumptions to Validate</div>
            <div class="caption">Positioning is a hypothesis until customers confirm it. These are the highest-priority items to test.</div>
            <div class="mini-list">
              ${data.assumptions.map(a => {
                const style = riskStyles(a.risk);
                return `
                  <div class="mini-item">
                    <div class="badge"
                         style="background:${style.bg}; color:${style.color}; border-color:${style.border};">
                      ${escapeHtml(a.risk)}
                    </div>
                    <div>
                      <div class="mini-item-title" style="color:#e2e8f0;">${escapeHtml(a.text)}</div>
                      <div class="mini-item-text">→ ${escapeHtml(a.action)}</div>
                    </div>
                  </div>
                `;
              }).join("")}
            </div>
          </div>

          <div class="glass validate-card">
            <div class="mono-title" style="color:#60a5fa;">Usage Guide</div>
            <div class="usage-grid">
              ${usageRows.map(row => `
                <div class="usage-row">
                  <div class="usage-context">${escapeHtml(row.context)}</div>
                  <div class="usage-use">→ ${escapeHtml(row.use)}</div>
                </div>
              `).join("")}
            </div>
          </div>

          <div class="callout" style="background:rgba(16,185,129,0.06); border-color:rgba(16,185,129,0.12); margin-top:0;">
            <div class="callout-title" style="color:#34d399;">🔗 Connected deliverables</div>
            <p>
              This positioning builds on the Competitive Intelligence Dashboard
              (competitive-intelligence-dashboard.jsx) and Competitive Profile
              (competitive-profile-blackline-vs-incumbents-2026-03-24.md). The three
              documents form a complete strategic toolkit: competitive landscape →
              positioning → messaging.
            </p>
          </div>
        </div>
      `;
    }

    function renderContent() {
      if (activeSection === "canvas") return renderCanvasSection();
      if (activeSection === "statement") return renderStatementSection();
      if (activeSection === "taglines") return renderTaglinesSection();
      if (activeSection === "personas") return renderPersonasSection();
      return renderValidateSection();
    }

    function attachCanvasEvents() {
      contentEl.querySelectorAll("[data-expand-id]").forEach(card => {
        card.addEventListener("click", () => {
          const id = card.getAttribute("data-expand-id");
          expandedElement = expandedElement === id ? null : id;
          render();
        });
      });
    }

    function render() {
      renderTabs();
      contentEl.innerHTML = renderContent();
      if (activeSection === "canvas") {
        attachCanvasEvents();
      }
    }

    render();
  </script>
</body>
</html>
