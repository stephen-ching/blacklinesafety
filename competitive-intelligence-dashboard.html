<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connected Safety Landscape</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #0f172a;
      --bg-2: #1e293b;
      --line: rgba(148, 163, 184, 0.12);
      --line-strong: rgba(148, 163, 184, 0.22);
      --text: #ffffff;
      --muted: #94a3b8;
      --muted-2: #64748b;
      --sky: #38bdf8;
      --sky-bg: rgba(14,165,233,0.15);
      --card: rgba(15, 23, 42, 0.74);
      --shadow: 0 0 20px rgba(14, 165, 233, 0.05);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-1) 100%);
      min-height: 100vh;
    }

    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.18em;
      color: var(--sky);
      margin-bottom: 6px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.1;
    }

    .subhead {
      margin-top: 8px;
      color: var(--muted-2);
      font-size: 13px;
    }

    .chip-row, .tab-row, .legend-row { display: flex; gap: 8px; flex-wrap: wrap; }

    .tab-row {
      margin: 18px 0 20px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .chip, .tab {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .chip:hover, .tab:hover { border-color: var(--line-strong); color: #cbd5e1; }

    .tab { border-radius: 12px; white-space: nowrap; }
    .tab.active { background: var(--sky-bg); border-color: rgba(14, 165, 233, 0.4); color: var(--sky); }
    .chip.active { opacity: 1; }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .card:hover { border-color: var(--line-strong); }

    .company-grid {
      display: grid;
      grid-template-columns: repeat(1, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }

    .company-card {
      padding: 18px;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease;
      border-left-width: 4px;
      border-left-style: solid;
    }

    .company-card:hover { transform: translateY(-1px); }

    .company-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .company-name { font-size: 16px; font-weight: 700; }
    .ticker { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted-2); margin-top: 4px; }
    .revenue { text-align: right; }
    .revenue .value { font-size: 17px; font-weight: 700; }
    .revenue .label { font-size: 11px; color: var(--muted-2); margin-top: 2px; }

    .meta { display: grid; gap: 8px; font-size: 12px; color: var(--muted); }
    .meta-row { display: flex; justify-content: space-between; gap: 10px; }
    .meta-row .value { color: #cbd5e1; text-align: right; max-width: 58%; }

    .detail-panel {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid rgba(51, 65, 85, 0.7);
    }

    .section-label { font-size: 12px; font-weight: 700; margin-bottom: 8px; }
    .section-label.green { color: #4ade80; }
    .section-label.red { color: #fb7185; }

    .mini-list { display: grid; gap: 6px; font-size: 12px; color: #cbd5e1; }
    .mini-item { display: flex; gap: 8px; align-items: flex-start; }
    .mini-item .symbol { line-height: 1; margin-top: 1px; font-weight: 700; }
    .symbol.plus { color: #22c55e; }
    .symbol.minus { color: #f43f5e; }

    .panel { padding: 20px; box-shadow: var(--shadow); }
    .panel-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .panel-subtitle { font-size: 12px; color: var(--muted-2); margin-bottom: 18px; }

    .bar-grid { display: grid; grid-template-columns: 1fr; gap: 0 30px; }
    .bar-block { margin-bottom: 12px; }
    .bar-label { font-size: 12px; color: #cbd5e1; margin-bottom: 6px; font-weight: 600; }
    .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .bar-company {
      width: 92px; text-align: right; font-size: 12px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .bar-track { flex: 1; height: 14px; border-radius: 999px; overflow: hidden; background: rgba(30, 41, 59, 0.8); }
    .bar-fill { height: 100%; border-radius: 999px; transition: width 0.7s ease; }
    .bar-value { width: 28px; text-align: right; font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }

    .radar-wrap { display: flex; flex-direction: column; align-items: center; }
    .radar-box { width: 100%; max-width: 760px; }
    .legend-row { justify-content: center; margin-top: 14px; }
    .legend-item { display: flex; align-items: center; gap: 8px; color: #cbd5e1; font-size: 12px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 999px; }

    .insight { margin-top: 22px; padding-top: 18px; border-top: 1px solid rgba(51, 65, 85, 0.55); }
    .insight .label { color: var(--sky); font-size: 12px; font-weight: 700; margin-bottom: 8px; }
    .insight p, .dhm-copy, .positioning { color: #cbd5e1; font-size: 13px; line-height: 1.7; margin: 0; }

    .stack { display: grid; gap: 16px; }
    .dhm-note { color: var(--muted-2); font-size: 12px; margin-bottom: 10px; }
    .dhm-card { padding: 20px; border-left-width: 4px; border-left-style: solid; }
    .dhm-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; }
    .dhm-row { margin-bottom: 16px; }
    .dhm-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; }
    .dhm-header strong { font-size: 13px; color: var(--text); }
    .dhm-header span { color: var(--muted-2); }

    .battlecard-top { border-top: 2px solid rgba(14, 165, 233, 0.4); padding: 20px; }

    .mono-label {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.16em;
      margin-bottom: 10px;
    }

    .text-sky { color: var(--sky); }
    .text-green { color: #4ade80; }
    .text-amber { color: #fbbf24; }
    .text-violet { color: #a78bfa; }

    .diff-item { display: flex; gap: 12px; margin-bottom: 14px; align-items: flex-start; }
    .diff-index {
      width: 26px; height: 26px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0; background: rgba(16, 185, 129, 0.15); color: #34d399;
    }
    .diff-copy, .objection-copy { font-size: 14px; color: #cbd5e1; line-height: 1.6; }
    .objection-item { margin-bottom: 18px; }
    .objection-head, .objection-body { display: flex; gap: 10px; align-items: flex-start; font-size: 12px; line-height: 1.6; }
    .objection-head { color: #fda4af; font-weight: 600; margin-bottom: 6px; }
    .objection-body { color: #cbd5e1; margin-left: 18px; }

    .two-col { display: grid; grid-template-columns: 1fr; gap: 16px; }
    .winloss { border-radius: 14px; padding: 16px; }
    .winloss.green { background: rgba(16,185,129,0.06); border: 1px solid rgba(16,185,129,0.15); }
    .winloss.red { background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.15); }
    .winloss-title { font-size: 13px; font-weight: 700; margin-bottom: 10px; }
    .winloss.green .winloss-title { color: #4ade80; }
    .winloss.red .winloss-title { color: #fb7185; }

    .plain-list { list-style: none; padding: 0; margin: 0; display: grid; gap: 8px; }
    .plain-list li { display: flex; gap: 8px; font-size: 13px; color: #cbd5e1; line-height: 1.5; }
    .plain-list .mark { font-weight: 700; margin-top: 1px; }
    .plain-list .mark.good { color: #22c55e; }
    .plain-list .mark.bad { color: #f43f5e; }

    svg text { font-family: 'Inter', system-ui, sans-serif; }

    @media (min-width: 760px) {
      .page { padding: 28px 28px 50px; }
      .company-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .bar-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .two-col { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (min-width: 1180px) {
      .company-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div>
        <div class="eyebrow">COMPETITIVE INTELLIGENCE</div>
        <h1>Connected Safety Landscape</h1>
        <div class="subhead">Blackline Safety vs. Incumbents — March 2026</div>
      </div>
      <div class="chip-row" id="companyChips"></div>
    </div>

    <div class="tab-row" id="tabRow"></div>
    <div id="app"></div>
  </div>

  <script>
    const companies = [{"name": "Blackline Safety", "ticker": "TSX: BLN", "hq": "Calgary, AB", "founded": "~2014", "revenue": "$150.5M CAD", "revenueNum": 150.5, "employees": "~700", "model": "Hardware-enabled SaaS", "color": "#0F766E", "accent": "#14B8A6", "scores": {"platform": 95, "gasDetection": 65, "loneWorker": 95, "saas": 90, "brand": 45, "distribution": 55, "comms": 95, "data": 85, "financial": 35, "innovation": 90}, "strengths": ["Cloud-native platform (Blackline Live)", "81% service gross margin, $90.5M ARR", "Combined gas + lone worker + comms in one device", "128% net dollar retention", "G8 next-gen launch (Feb 2026)", "36 consecutive quarters of YoY growth", "Cellular + satellite connectivity"], "weaknesses": ["Scale: $150M CAD vs billions", "Narrow product focus", "Just reached profitability (FY2025)", "Limited brand recognition outside niche", "Product revenue decline in Q1 FY2026"], "dhm": {"delight": "Purpose-built connected safety wearable combining gas detection, lone worker, and real-time communication. Cloud-native platform streams live data for situational awareness.", "hardToCopy": "Cloud-native architecture built from ground up for IoT. 323B+ data points creating analytics moat. Integrated cellular/satellite connectivity in a single device.", "margin": "HeSaaS model: 81% service gross margin, 63% blended gross margin. $90.5M ARR growing 28% YoY. First full year of positive Adjusted EBITDA in FY2025."}}, {"name": "Industrial Scientific", "ticker": "Fortive (NYSE: FTV)", "hq": "Pittsburgh, PA", "founded": "1985", "revenue": "~$300M est.", "revenueNum": 300, "employees": "~800", "model": "Products + iNet Subscriptions", "color": "#1D4ED8", "accent": "#3B82F6", "scores": {"platform": 65, "gasDetection": 80, "loneWorker": 25, "saas": 75, "brand": 70, "distribution": 70, "comms": 20, "data": 60, "financial": 75, "innovation": 60}, "strengths": ["iNet Exchange subscription eliminates maintenance", "Ventis Pro5 trusted across oil & gas and mining", "SAFER One plume modeling is unique", "Fortive Business System operational discipline", "Intelex EHSQ software platform integration", "40+ years of installed base"], "weaknesses": ["Platform architecture not cloud-native", "No integrated lone worker protection", "No real-time communication capability", "Innovation pace constrained by corporate parent", "Limited connected worker vision"], "dhm": {"delight": "iNet Exchange subscription eliminates maintenance pain. Ventis Pro5 is a workhorse. SAFER One plume modeling is unique for emergency response scenarios.", "hardToCopy": "Fortive Business System drives operational excellence. iNet platform creates switching costs. 40+ years of installed base. Intelex EHSQ integration potential.", "margin": "Backed by Fortive ($6.2B revenue). Product + subscription model. FBS drives margin expansion. Not independently disclosed but Fortive expects each business to deliver."}}, {"name": "MSA Safety", "ticker": "NYSE: MSA", "hq": "Cranberry Twp, PA", "founded": "1914", "revenue": "$1.9B USD", "revenueNum": 1900, "employees": "~5,300", "model": "Products + MSA+ Ecosystem", "color": "#B91C1C", "accent": "#EF4444", "scores": {"platform": 45, "gasDetection": 85, "loneWorker": 30, "saas": 40, "brand": 95, "distribution": 85, "comms": 15, "data": 40, "financial": 90, "innovation": 50}, "strengths": ["110+ years of safety heritage — ultimate brand trust", "Broadest safety portfolio (gas, fall, fire, head)", "MSA+ connected ecosystem growing", "ALTAIR gas detectors widely deployed", "40+ international locations", "$1.2B liquidity, 0.9x leverage"], "weaknesses": ["MSA+ playing catch-up in connected platforms", "Product-heavy revenue mix (lower margins)", "Innovation often acquisition-driven", "Legacy architecture limits IoT integration", "Slower to adapt to cloud-native world"], "dhm": {"delight": "110+ year safety brand creates enormous trust. Broadest safety portfolio — one vendor from helmets to gas detectors. ALTAIR family well-known. Global service network.", "hardToCopy": "Brand legacy is the deepest moat. Regulatory relationships with OSHA, NIOSH, NFPA. Distribution across 40+ countries. Portfolio breadth enables cross-selling.", "margin": "$1.9B revenue, ~46% gross margin. Premium pricing supported by brand. Very conservative balance sheet. Mid-single digit organic growth. Diversified end markets."}}, {"name": "Honeywell", "ticker": "NYSE: HON", "hq": "Charlotte, NC", "founded": "1906", "revenue": "$10B+ (Ind. Auto.)", "revenueNum": 10000, "employees": "95,000+", "model": "Products + Services", "color": "#7C3AED", "accent": "#A78BFA", "scores": {"platform": 40, "gasDetection": 90, "loneWorker": 20, "saas": 30, "brand": 85, "distribution": 95, "comms": 15, "data": 45, "financial": 95, "innovation": 45}, "strengths": ["BW Technologies + RAE Systems brand portfolio", "~22% global gas detection market share", "Semiconductor vertical expertise", "200+ locations, 24/7 global support", "Design award-winning products (Red Dot, iF)", "New H2 leak detection for hydrogen economy"], "weaknesses": ["Gas detection is small within massive Honeywell", "Corporate priority shifts can deprioritize", "Slower innovation cycles in large corporation", "Limited connected worker platform", "Restructuring in 2025-2026 creates uncertainty"], "dhm": {"delight": "BW Technologies brand deeply trusted in portable gas detection. RAE Systems brings high-end PID capability. Widest fixed + portable portfolio covers every use case.", "hardToCopy": "Scale is the ultimate moat — $40B+ corporate resources. BW + RAE acquisitions combined strongest portable brands. Semiconductor vertical depth is specialized. 22% global market share.", "margin": "Industrial Automation segment ~$10B sales, ~19% segment margin. Gas detection a relatively small portion. Essentially unlimited financial resources relative to market size."}}];
    const dimensions = [{"key": "platform", "label": "Connected Platform"}, {"key": "gasDetection", "label": "Gas Detection Breadth"}, {"key": "loneWorker", "label": "Lone Worker Protection"}, {"key": "saas", "label": "SaaS / Subscription Model"}, {"key": "brand", "label": "Brand Trust"}, {"key": "distribution", "label": "Global Distribution"}, {"key": "comms", "label": "Real-time Comms"}, {"key": "data", "label": "Data & Analytics"}, {"key": "financial", "label": "Financial Strength"}, {"key": "innovation", "label": "Innovation Velocity"}];
    const battlecard = {"positioning": "Blackline Safety is the only purpose-built connected safety platform that combines gas detection, lone worker protection, and real-time communication in a single cloud-native ecosystem.", "differentiators": ["Cloud-native, not cloud-bolted — Blackline Live built for IoT from day one", "One device, three solutions — G8 replaces detector + lone worker + radio", "128% net dollar retention — customers expand because the platform delivers"], "objections": [{"challenge": "MSA has 110 years of heritage", "counter": "Heritage matters, but connected worksites need purpose-built connected solutions, not standalone instruments retrofitted with connectivity."}, {"challenge": "Honeywell has the widest portfolio", "counter": "Width ≠ depth. Honeywell makes everything from thermostats to jet engines. Every Blackline R&D dollar goes into connected safety."}, {"challenge": "Industrial Scientific's iNet eliminates maintenance", "counter": "iNet maintains instruments. Blackline transforms safety data into actionable intelligence, plus G8 improves via OTA updates — no exchange needed."}]};

    const winItems = [
      "Customer values real-time connectivity & cloud analytics",
      "Worksite needs gas + lone worker + comms in one device",
      "Buyer evaluates total cost of ownership, not just hardware",
      "Remote locations need cellular/satellite connectivity",
      "Org is migrating to cloud-based safety management"
    ];

    const lossItems = [
      "Brand trust is paramount (MSA)",
      "Full safety portfolio needed — one vendor (MSA)",
      "Specialized application: semiconductor, H2 (Honeywell)",
      "Global scale of support is deciding factor (Honeywell)",
      "Proven subscription maintenance model valued (IndSci)"
    ];

    const tabs = [
      { id: "overview", label: "Overview" },
      { id: "radar", label: "Competitive Radar" },
      { id: "dhm", label: "DHM Analysis" },
      { id: "battlecard", label: "Battlecard" }
    ];

    const state = {
      activeTab: "overview",
      selectedCompany: null,
      visibleCompanies: companies.map(c => c.name)
    };

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function hexToRgba(hex, alpha) {
      const normalized = hex.replace("#", "");
      const full = normalized.length === 3 ? normalized.split("").map(c => c + c).join("") : normalized;
      const bigint = parseInt(full, 16);
      const r = (bigint >> 16) & 255;
      const g = (bigint >> 8) & 255;
      const b = bigint & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function safeQuoted(str) {
      return JSON.stringify(String(str));
    }

    function getFilteredCompanies() {
      return companies.filter(c => state.visibleCompanies.includes(c.name));
    }

    function toggleCompany(name) {
      const idx = state.visibleCompanies.indexOf(name);
      if (idx >= 0) {
        if (state.visibleCompanies.length === 1) return;
        state.visibleCompanies.splice(idx, 1);
        if (state.selectedCompany === name) state.selectedCompany = null;
      } else {
        state.visibleCompanies.push(name);
      }
      render();
    }

    function setTab(tabId) {
      state.activeTab = tabId;
      render();
    }

    function setSelectedCompany(name) {
      state.selectedCompany = state.selectedCompany === name ? null : name;
      render();
    }

    function renderTabs() {
      document.getElementById("tabRow").innerHTML = tabs.map(tab => `
        <button class="tab ${state.activeTab === tab.id ? "active" : ""}" onclick='setTab(${safeQuoted(tab.id)})'>${escapeHtml(tab.label)}</button>
      `).join("");
    }

    function renderChips() {
      document.getElementById("companyChips").innerHTML = companies.map(c => {
        const active = state.visibleCompanies.includes(c.name);
        return `
          <button
            class="chip ${active ? "active" : ""}"
            onclick='toggleCompany(${safeQuoted(c.name)})'
            style="
              background:${active ? hexToRgba(c.accent, 0.14) : "transparent"};
              border-color:${active ? hexToRgba(c.accent, 0.45) : "rgba(148, 163, 184, 0.15)"};
              color:${active ? c.accent : "rgba(148,163,184,0.45)"};
              opacity:${active ? 1 : 0.58};
            "
          >${escapeHtml(c.name.split(" ")[0])}</button>
        `;
      }).join("");
    }

    function renderOverview(filtered) {
      return `
        <div>
          <div class="company-grid">
            ${filtered.map(c => `
              <div class="card company-card" onclick='setSelectedCompany(${safeQuoted(c.name)})' style="border-left-color:${c.accent}">
                <div class="company-head">
                  <div>
                    <div class="company-name">${escapeHtml(c.name)}</div>
                    <div class="ticker">${escapeHtml(c.ticker)}</div>
                  </div>
                  <div class="revenue">
                    <div class="value" style="color:${c.accent}">${escapeHtml(c.revenue)}</div>
                    <div class="label">revenue</div>
                  </div>
                </div>
                <div class="meta">
                  <div class="meta-row"><span>Founded</span><span class="value">${escapeHtml(c.founded)}</span></div>
                  <div class="meta-row"><span>HQ</span><span class="value">${escapeHtml(c.hq)}</span></div>
                  <div class="meta-row"><span>Employees</span><span class="value">${escapeHtml(c.employees)}</span></div>
                  <div class="meta-row"><span>Model</span><span class="value">${escapeHtml(c.model)}</span></div>
                </div>
                ${state.selectedCompany === c.name ? `
                  <div class="detail-panel">
                    <div class="section-label green">Strengths</div>
                    <div class="mini-list">
                      ${c.strengths.map(s => `<div class="mini-item"><span class="symbol plus">+</span><span>${escapeHtml(s)}</span></div>`).join("")}
                    </div>
                    <div class="section-label red" style="margin-top:14px;">Weaknesses</div>
                    <div class="mini-list">
                      ${c.weaknesses.map(w => `<div class="mini-item"><span class="symbol minus">−</span><span>${escapeHtml(w)}</span></div>`).join("")}
                    </div>
                  </div>
                ` : ""}
              </div>
            `).join("")}
          </div>

          <div class="card panel">
            <div class="panel-title">Head-to-Head Scoring</div>
            <div class="panel-subtitle">Compare each company across core connected safety dimensions.</div>
            <div class="bar-grid">
              ${dimensions.map(dim => `
                <div class="bar-block">
                  <div class="bar-label">${escapeHtml(dim.label)}</div>
                  ${filtered.map(c => `
                    <div class="bar-row">
                      <div class="bar-company" style="color:${c.accent}">${escapeHtml(c.name.split(" ")[0])}</div>
                      <div class="bar-track">
                        <div class="bar-fill" style="width:${c.scores[dim.key]}%; background: linear-gradient(90deg, ${c.color}, ${c.accent});"></div>
                      </div>
                      <div class="bar-value">${c.scores[dim.key]}</div>
                    </div>
                  `).join("")}
                </div>
              `).join("")}
            </div>
          </div>
        </div>
      `;
    }

    function getRadarSvg(visibleCompanies, size = 640) {
      const cx = size / 2;
      const cy = size / 2;
      const radius = size * 0.32;
      const levels = 5;
      const angleStep = (Math.PI * 2) / dimensions.length;

      function getPoint(index, value) {
        const angle = angleStep * index - Math.PI / 2;
        const r = (value / 100) * radius;
        return {
          x: cx + r * Math.cos(angle),
          y: cy + r * Math.sin(angle)
        };
      }

      const levelPolygons = Array.from({ length: levels }, (_, i) => {
        const r = radius * ((i + 1) / levels);
        const points = dimensions.map((_, j) => {
          const angle = angleStep * j - Math.PI / 2;
          return `${cx + r * Math.cos(angle)},${cy + r * Math.sin(angle)}`;
        }).join(" ");
        return `<polygon points="${points}" fill="none" stroke="rgba(148,163,184,0.2)" stroke-width="1"></polygon>`;
      }).join("");

      const axes = dimensions.map((dim, i) => {
        const end = getPoint(i, 100);
        const labelPoint = getPoint(i, 120);
        return `
          <g>
            <line x1="${cx}" y1="${cy}" x2="${end.x}" y2="${end.y}" stroke="rgba(148,163,184,0.18)" stroke-width="1"></line>
            <text x="${labelPoint.x}" y="${labelPoint.y}" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="rgba(203,213,225,0.78)">
              ${escapeHtml(dim.label)}
            </text>
          </g>
        `;
      }).join("");

      const companyLayers = visibleCompanies.map(company => {
        const points = dimensions.map((dim, i) => {
          const p = getPoint(i, company.scores[dim.key]);
          return `${p.x},${p.y}`;
        }).join(" ");

        const circles = dimensions.map((dim, i) => {
          const p = getPoint(i, company.scores[dim.key]);
          return `<circle cx="${p.x}" cy="${p.y}" r="4" fill="${company.accent}"></circle>`;
        }).join("");

        return `
          <g>
            <polygon points="${points}" fill="${hexToRgba(company.accent, 0.12)}" stroke="${company.accent}" stroke-width="2"></polygon>
            ${circles}
          </g>
        `;
      }).join("");

      return `
        <svg viewBox="0 0 ${size} ${size}" style="width:100%;height:auto;display:block;">
          ${levelPolygons}
          ${axes}
          ${companyLayers}
        </svg>
      `;
    }

    function renderRadar(filtered) {
      return `
        <div class="card panel">
          <div class="panel-title">Competitive Capability Radar</div>
          <div class="panel-subtitle">Toggle companies above to compare. Outer ring = 100 (best).</div>
          <div class="radar-wrap">
            <div class="radar-box">${getRadarSvg(filtered)}</div>
            <div class="legend-row">
              ${filtered.map(c => `
                <div class="legend-item">
                  <span class="legend-dot" style="background:${c.accent}"></span>
                  <span>${escapeHtml(c.name)}</span>
                </div>
              `).join("")}
            </div>
          </div>
          <div class="insight">
            <div class="label">Key Insight</div>
            <p>Blackline dominates on connected platform, lone worker, comms, and innovation dimensions — areas that define the future of industrial safety. Incumbents lead on brand, distribution, financial strength, and gas detection breadth — advantages rooted in scale and history. The competitive question is whether the market shifts fast enough toward connected solutions before incumbents close the platform gap.</p>
          </div>
        </div>
      `;
    }

    function renderDhm(filtered) {
      const dhmBlocks = [
        { key: "delight", label: "Delight", icon: "✦", desc: "What customers love" },
        { key: "hardToCopy", label: "Hard-to-Copy", icon: "⬡", desc: "Competitive moats" },
        { key: "margin", label: "Margin", icon: "◈", desc: "Business sustainability" }
      ];

      return `
        <div>
          <div class="dhm-note">Gibson Biddle's DHM Model — Delight, Hard-to-Copy, Margin</div>
          <div class="stack">
            ${filtered.map(c => `
              <div class="card dhm-card" style="border-left-color:${c.accent}">
                <div class="dhm-title" style="color:${c.accent}">${escapeHtml(c.name)}</div>
                ${dhmBlocks.map(d => `
                  <div class="dhm-row">
                    <div class="dhm-header">
                      <span>${d.icon}</span>
                      <strong>${escapeHtml(d.label)}</strong>
                      <span>— ${escapeHtml(d.desc)}</span>
                    </div>
                    <p class="dhm-copy">${escapeHtml(c.dhm[d.key])}</p>
                  </div>
                `).join("")}
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderBattlecard() {
      return `
        <div class="stack">
          <div class="card battlecard-top">
            <div class="mono-label text-sky">POSITIONING</div>
            <p class="positioning">${escapeHtml(battlecard.positioning)}</p>
          </div>

          <div class="card panel">
            <div class="mono-label text-green">KEY DIFFERENTIATORS</div>
            ${battlecard.differentiators.map((d, i) => `
              <div class="diff-item">
                <div class="diff-index">${i + 1}</div>
                <div class="diff-copy">${escapeHtml(d)}</div>
              </div>
            `).join("")}
          </div>

          <div class="card panel">
            <div class="mono-label text-amber">HANDLE OBJECTIONS</div>
            ${battlecard.objections.map(obj => `
              <div class="objection-item">
                <div class="objection-head">
                  <span>▸</span>
                  <div>If they say: "${escapeHtml(obj.challenge)}"</div>
                </div>
                <div class="objection-body">
                  <span style="color:#4ade80;">→</span>
                  <div>${escapeHtml(obj.counter)}</div>
                </div>
              </div>
            `).join("")}
          </div>

          <div class="card panel">
            <div class="mono-label text-violet">WIN / LOSS SCENARIOS</div>
            <div class="two-col">
              <div class="winloss green">
                <div class="winloss-title">Blackline wins when...</div>
                <ul class="plain-list">
                  ${winItems.map(item => `<li><span class="mark good">✓</span><span>${escapeHtml(item)}</span></li>`).join("")}
                </ul>
              </div>
              <div class="winloss red">
                <div class="winloss-title">Incumbents win when...</div>
                <ul class="plain-list">
                  ${lossItems.map(item => `<li><span class="mark bad">✗</span><span>${escapeHtml(item)}</span></li>`).join("")}
                </ul>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function render() {
      renderTabs();
      renderChips();
      const filtered = getFilteredCompanies();
      let html = "";
      if (state.activeTab === "overview") html = renderOverview(filtered);
      if (state.activeTab === "radar") html = renderRadar(filtered);
      if (state.activeTab === "dhm") html = renderDhm(filtered);
      if (state.activeTab === "battlecard") html = renderBattlecard(filtered);
      document.getElementById("app").innerHTML = html;
    }

    render();
  </script>
</body>
</html>
